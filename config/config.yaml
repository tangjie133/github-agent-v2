# GitHub Agent V2 - Configuration
# Phase 1: Core Framework

# ============================================
# Cloud Agent Configuration (Intent Recognition)
# ============================================
cloud_agent:
  provider: openclaw  # Options: openclaw, claude, openai
  api_url: http://localhost:3000/api/v1
  timeout: 30
  retry_count: 3
  
  # Intent classification prompt template
  intent_classification:
    system_prompt: |
      You are an intent classification assistant for a GitHub automation system.
      Analyze the user's issue/comment and classify the intent.
      
      Possible intents:
      - "answer": User is asking a question, seeking explanation, or requesting clarification
      - "modify": User wants code changes, bug fixes, or feature implementation
      - "research": User describes a problem but needs investigation to determine solution
      - "clarify": Information is insufficient to determine intent
      
      Return JSON format:
      {
        "intent": "answer|modify|research|clarify",
        "confidence": 0.0-1.0,
        "reasoning": "Brief explanation of why this intent was chosen",
        "needs_research": true|false,
        "research_topics": ["topic1", "topic2"]  # Only if needs_research is true
      }

# ============================================
# Knowledge Base Configuration
# ============================================
knowledge_base:
  enabled: true
  service_url: http://localhost:8000
  similarity_threshold: 0.7
  top_k: 3
  auto_sync: true
  sync_interval: 3600  # seconds
  
  # Document sources
  sources:
    - type: github_repo
      repo: tangjie133/knowledge-base
      branch: main
    - type: local
      path: ./local_knowledge

# ============================================
# Code Executor Configuration
# ============================================
code_executor:
  model: qwen3-coder:30b
  host: http://localhost:11434
  temperature: 0.3
  max_context_tokens: 131072  # 128K for qwen3-coder:30b
  
  # Model-specific settings
  models:
    qwen3-coder:30b:
      num_ctx: 131072
      num_predict: 8000
    qwen2.5-coder:32b:
      num_ctx: 32768
      num_predict: 8000
    qwen2.5-coder:14b:
      num_ctx: 16384
      num_predict: 6000
  
  # Safe modification settings
  safe_modify:
    enabled: true
    max_file_size_lines: 100  # Use chunked approach for larger files
    chunk_context_lines: 3    # Context lines around modification

# ============================================
# Trigger Mode Configuration
# ============================================
trigger:
  issue_mode: smart  # auto: process all issues, smart: only with @agent
  comment_mode: smart  # smart: only with @agent, all: any comment
  confirm_mode: auto  # auto: direct execute, manual: wait for confirmation
  auto_confirm_threshold: 0.8  # Confidence threshold for auto mode

# ============================================
# GitHub API Configuration
# ============================================
github:
  api_version: 2022-11-28
  base_url: https://api.github.com
  
  # Branch naming
  branch_prefix: agent/
  branch_suffix: "-fix-issue-{issue_number}"
  
  # PR settings
  pr:
    auto_link_issue: true
    template: |
      ## Summary
      This PR addresses issue #{issue_number}
      
      ## Changes
      {change_description}
      
      ## Files Modified
      {files_list}
      
      ---
      *Generated by GitHub Agent V2* 🤖

# ============================================
# Logging Configuration
# ============================================
logging:
  level: INFO  # DEBUG, INFO, WARNING, ERROR
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: /tmp/github-agent-v2.log

# ============================================
# State Management
# ============================================
state:
  storage_dir: /tmp/github-agent-v2/state
  retention_days: 30
